version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: loffielaundry-app
    container_name: loffielaundry-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - loffie-network

  web:
    image: nginx:alpine
    container_name: loffielaundry-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - loffie-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: loffielaundry-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-db_loffielaundry}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - loffie-mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - loffie-network

networks:
  loffie-network:
    driver: bridge

volumes:
  loffie-mysql-data:
    driver: local
